spring:
  datasource:
    url: jdbc:tc:postgresql:17-alpine:///testdb
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc.batch_size: 100
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: 500
    open-in-view: false

logging:
  level:
    root: info
    com.sprint.mission.discodeit: debug
    org.hibernate.orm.jdbc.bind: warn
    org.hibernate.SQL: warn
